<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 { margin-bottom: 6px; font-size: 28px; color: #0f0; }
  #info {
    display: flex;
    gap: 30px;
    margin-bottom: 8px;
    font-size: 16px;
  }
  canvas {
    border: 2px solid #0f0;
    border-radius: 4px;
    background: #0f0f1a;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { font-size: 32px; margin-bottom: 8px; color: #ff4444; }
  #overlay p  { font-size: 16px; color: #ccc; }
  #msg { margin-top: 6px; font-size: 14px; color: #888; }
</style>
</head>
<body>

<h1>SNAKE</h1>
<div id="info">
  <span>Score: <b id="score">0</b></span>
  <span>Best: <b id="best">0</b></span>
</div>
<div style="position:relative;display:inline-block;">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle">Game Over</h2>
    <p id="overlayMsg">Press <b>Space</b> or tap to play again</p>
  </div>
</div>
<p id="msg">Arrow keys / WASD to move &bull; Space to restart</p>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;
const SNAKE_SPEED = 5; // cells per second

let snake, dir, nextDir, food, score, best = 0, running, loop, lastTime = 0;

function init() {
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX, y: midY },
    { x: midX - 1, y: midY },
    { x: midX - 2, y: midY }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { ...dir };
  score = 0;
  scoreEl.textContent = score;
  placeFood();
  running = true;
  overlay.classList.add('hidden');
  lastTime = 0;
  requestAnimationFrame(gameLoop);
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update(deltaTime) {
  if (!running) return;

  // Move snake based on speed and time elapsed
  const moveInterval = 1000 / SNAKE_SPEED; // milliseconds per move
  if (deltaTime < moveInterval) {
    return deltaTime; // return remaining time to accumulate
  }

  // Perform game logic
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver();
    return 0;
  }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return 0;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
  return 0; // reset accumulator after move
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const deltaTime = timestamp - lastTime;
  const remainingTime = update(deltaTime);
  lastTime = timestamp - remainingTime;

  if (running) {
    requestAnimationFrame(gameLoop);
  }
}

function draw() {
  // background
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }

  // food
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // snake
  snake.forEach((s, i) => {
    const brightness = Math.max(0.35, 1 - i * 0.03);
    ctx.fillStyle = `rgba(0, ${Math.floor(255 * brightness)}, 0, 1)`;
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2);
  });
}

function gameOver() {
  running = false;
  overlayTitle.textContent = 'Game Over';
  overlayMsg.innerHTML = `Score: <b>${score}</b><br>Press <b>Space</b> or tap to play again`;
  overlay.classList.remove('hidden');
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { if (!running) init(); return; }
  const keyMap = {
    ArrowUp:    { x:  0, y: -1 }, KeyW: { x:  0, y: -1 },
    ArrowDown:  { x:  0, y:  1 }, KeyS: { x:  0, y:  1 },
    ArrowLeft:  { x: -1, y:  0 }, KeyA: { x: -1, y:  0 },
    ArrowRight: { x:  1, y:  0 }, KeyD: { x:  1, y:  0 },
  };
  const nd = keyMap[e.code];
  if (nd && running && (nd.x !== -dir.x || nd.y !== -dir.y)) {
    nextDir = nd;
    e.preventDefault();
  }
});

canvas.addEventListener('click', () => { if (!running) init(); });

// initial state
running = false;
overlayTitle.textContent = 'SNAKE';
overlayMsg.innerHTML = 'Press <b>Space</b> or tap to start';
overlay.classList.remove('hidden');
// Initial draw will happen in init()
init();
</script>
</body>
</html>
